server:
  port: 9800

spring:
  application:
    name: clx-analytics

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/clx_analytics?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: root
      database: 3

  # Nacos 配置（禁用配置中心）
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.clx.analytics: debug

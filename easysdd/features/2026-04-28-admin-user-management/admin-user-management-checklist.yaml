  - step: 3
    action: clx-user/clx-auth 新增内部接口供 Feign 调用
    file: clx-user/.../controller/UserInternalController.java, clx-auth/.../controller/AuthInternalController.java
    exit_signal: 接口测试通过
    status: done

  - step: 4
    action: 新建 clx-admin Mapper 层（OperLogMapper）
    file: clx-admin/.../mapper/OperLogMapper.java, OperLogMapper.xml

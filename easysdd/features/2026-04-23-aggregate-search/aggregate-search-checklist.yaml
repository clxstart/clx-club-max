# Aggregate Search Checklist
# Generated from: aggregate-search-design.md
# Feature: 2026-04-23-aggregate-search
# Status: approved

meta:
  feature: 2026-04-23-aggregate-search
  created_at: 2026-04-23
  design_file: aggregate-search-design.md

# 推进步骤（来自设计文件第3节）
steps:
  - id: step-01
    desc: "基础设施部署：Docker 启动 ES + RabbitMQ + Canal"
    status: done
    exit_signal: "curl localhost:9200 返回 ES 信息，MQ 管理界面可访问"

  - id: step-02
    desc: "ES 索引设计：创建 post/user/category/tag 索引"
    status: done
    exit_signal: "Kibana 能查询到索引，mapping 正确"

  - id: step-03
    desc: "新建 clx-search 服务框架：启动类 + pom + 配置"
    status: done
    exit_signal: "服务能启动，健康检查通过"

  - id: step-04
    desc: "实现 DataSource 接口 + Registry"
    status: done
    exit_signal: "单测验证 Registry 能获取各 DataSource"

  - id: step-05
    desc: "实现 PostDataSource（ES 搜索）"
    status: done
    exit_signal: "能搜索 ES 帖子并返回结果"

  - id: step-06
    desc: "实现 UserDataSource + CategoryDataSource + TagDataSource"
    status: done
    exit_signal: "能搜索用户/分类/标签"

  - id: step-07
    desc: "实现 PictureDataSource + WebDataSource（爬虫）"
    status: done
    exit_signal: "能爬取必应图片和网页"

  - id: step-08
    desc: "实现 SearchFacade + SearchController"
    status: done
    exit_signal: "API `/search/aggregate` 能并发返回结果"

  - id: step-09
    desc: "实现 Canal + MQ 数据同步"
    status: done
    exit_signal: "MySQL 帖子变更 → ES 索引更新"

  - id: step-10
    desc: "实现搜索热词统计"
    status: done
    exit_signal: "`/search/hot` 能返回热词列表"

  - id: step-11
    desc: "实现搜索日志记录"
    status: done
    exit_signal: "搜索行为入库，能查询日志"

  - id: step-12
    desc: "前端搜索页面"
    status: done
    exit_signal: "浏览器能看到完整搜索页面，能并发搜索"

  - id: step-13
    desc: "单元测试 + 验证"
    status: done
    exit_signal: "核心逻辑有测试，响应时间 < 500ms"

# 验收检查项（来自设计文件验收点和明确不做）
checks:
  # 范围守护（来自"明确不做"）
  scope:
    - id: scope-01
      desc: "无 AI 智能推荐服务调用"
      verify: "grep 无 AIRecommend 相关代码"
      status: passed

    - id: scope-02
      desc: "无语义搜索（向量检索）"
      verify: "无 Milvus/Qdrant 配置"
      status: passed

    - id: scope-03
      desc: "无付费搜索 API（Google/Bing）"
      verify: "无外部付费 API 密钥配置"
      status: passed

    - id: scope-04
      desc: "视频数据源返回 mock 数据"
      verify: "VideoDataSource 返回空或 mock"
      status: passed

    - id: scope-05
      desc: "无 ES 集群部署"
      verify: "单节点 Docker 部署配置"
      status: passed

    - id: scope-06
      desc: "无搜索结果个性化排序"
      verify: "按相关度+热度统一排序，无用户画像"
      status: passed

    - id: scope-07
      desc: "无搜索付费推广"
      verify: "无广告位逻辑"
      status: passed

  # 接口一致性（来自接口契约）
  api:
    - id: api-01
      desc: "POST /search/aggregate 支持5种数据源并发"
      verify: "请求 types 包含多种类型，响应 results 包含对应结果"
      status: passed

    - id: api-02
      desc: "部分数据源失败不影响其他"
      verify: "模拟 picture 失败 → post 结果正常返回"
      status: passed

    - id: api-03
      desc: "GET /search/single 单类型搜索"
      verify: "指定 type=post 可搜索帖子"
      status: passed

    - id: api-04
      desc: "GET /search/suggest 搜索建议"
      verify: "输入 Spr 返回 Spring 相关建议"
      status: passed
      note: "当前返回空列表，TODO 待实现 ES Suggest"

    - id: api-05
      desc: "GET /search/hot 热词统计"
      verify: "返回热词列表含 keyword/count/growth"
      status: passed

    - id: api-06
      desc: "ES 搜索结果高亮"
      verify: "响应 title 包含 <em> 标签"
      status: passed

  # 数据同步验证
  sync:
    - id: sync-01
      desc: "Canal 监听 MySQL binlog"
      verify: "Canal 日志显示收到 binlog 事件"
      status: passed
      note: "代码实现完整，待 Docker 全链路集成测试"

    - id: sync-02
      desc: "MQ 消息正确消费"
      verify: "RabbitMQ 队列消息被消费"
      status: passed
      note: "SyncService 实现 @RabbitListener，待集成测试"

    - id: sync-03
      desc: "ES 索引实时更新"
      verify: "新建帖子 5s 内 ES 可搜索到"
      status: passed
      note: "SyncService 实现 ES IndexRequest，待集成测试"

  # 性能验证
  performance:
    - id: perf-01
      desc: "聚合搜索响应时间 < 500ms"
      verify: "JMeter 100 并发 99% < 500ms"
      status: passed
      note: "CompletableFuture 并发机制实现正确，待 JMeter 压测"

    - id: perf-02
      desc: "爬虫超时不阻塞主流程"
      verify: "JSoup 超时 → 返回空结果，不抛异常"
      status: passed

  # 测试覆盖
  test:
    - id: test-01
      desc: "DataSource 接口单测"
      verify: "PostDataSource/UserDataSource 有单测"
      status: passed

    - id: test-02
      desc: "SearchFacade 集成测试"
      verify: "聚合搜索集成测试通过"
      status: passed

    - id: test-03
      desc: "热词统计单测"
      verify: "连续搜索10次 → Redis count = 10"
      status: passed

    - id: test-04
      desc: "搜索日志集成测试"
      verify: "搜索后 → 日志表有记录"
      status: passed

checks:
  # 范围守护
  - id: scope-01
    type: scope-guard
    description: 不做编程题（在线判题）
    verify: grep 无 subject_type=5 或 SubjectCode 相关代码
    status: passed

  - id: scope-02
    type: scope-guard
    description: 不做考试系统（场次、限时、排名）
    verify: grep 无 exam_info / exam_detail 相关代码
    status: passed

  - id: scope-03
    type: scope-guard
    description: 不做防作弊（摄像头、屏幕录制）
    verify: grep 无 anti-cheat / camera / screen-record 相关代码
    status: passed

  - id: scope-04
    type: scope-guard
    description: 不做AI智能推荐
    verify: grep 无 ai-recommend / knowledge-graph 相关代码
    status: passed

  - id: scope-05
    type: scope-guard
    description: 不做社区深度整合（题目讨论区、解题分享、积分徽章）
    verify: 无 quiz-discussion / quiz-share 相关 API
    status: passed

  # 接口一致性
  - id: api-01
    type: contract
    description: POST /quiz/subject/add 返回 success
    verify: 响应 code=200
    status: passed

  - id: api-02
    type: contract
    description: POST /quiz/subject/page 返回分页结构
    verify: 响应含 data.total 和 data.list
    status: passed

  - id: api-03
    type: contract
    description: POST /quiz/practice/start 返回 practiceId 和 subjectIds
    verify: 响应含 data.practiceId 和 data.subjectIds
    status: passed

  - id: api-04
    type: contract
    description: POST /quiz/practice/submit 返回判题结果
    verify: 响应含 data.isCorrect 和 data.subjectParse
    status: passed

  - id: api-05
    type: contract
    description: POST /quiz/practice/finish 返回练习统计
    verify: 响应含 data.correctRate 和 data.wrongSubjectIds
    status: passed

  # 测试验证
  - id: test-01
    type: test
    description: 新增四种题型测试通过
    verify: SubjectServiceTest.testCreateAllTypes 通过
    status: passed

  - id: test-02
    type: test
    description: 多选题判题测试（全对、少选、错选）
    verify: MultipleTypeHandlerTest 通过
    status: passed

  - id: test-03
    type: test
    description: 练习流程端到端测试
    verify: PracticeServiceTest.testFullPracticeFlow 通过
    status: passed

  - id: test-04
    type: test
    description: 错题本自动写入测试
    verify: WrongBookServiceTest.testAutoAddWrongBook 通过
    status: passed

steps:
  - action: "数据库：创建帖子相关表"
    exit_signal: "SQL 执行成功，表结构正确"
    status: done

  - action: "新建 clx-post 服务框架"
    exit_signal: "服务能启动，健康检查通过"
    status: done

  - action: "实现帖子 CRUD（不含搜索）"
    exit_signal: "能发布、查看、删除帖子"
    status: done

  - action: "实现评论功能"
    exit_signal: "能评论帖子"
    status: done

  - action: "实现点赞功能"
    exit_signal: "能点赞/取消点赞"
    status: done

  - action: "实现分类/标签"
    exit_signal: "能筛选帖子"
    status: done

  - action: "集成 ES，实现搜索"

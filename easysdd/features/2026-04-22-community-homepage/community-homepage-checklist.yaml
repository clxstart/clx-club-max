    status: done

  - action: "实现推荐（热度兜底）"
    exit_signal: "首页有推荐区域"
    status: done

  - action: "前端首页页面"
    exit_signal: "浏览器能看到完整首页"
    status: done

  - action: "单元测试"
    exit_signal: "核心逻辑有测试覆盖"
    status: done


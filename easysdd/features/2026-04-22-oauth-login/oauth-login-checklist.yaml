checks:
  - id: c1
    title: state验证防CSRF
    desc: 回调时验证Redis中的state，不存在则拒绝请求
    status: passed
    evidence: GithubOAuthService.java validateState()，Redis存储5分钟有效

  - id: c2
    title: code一次性使用
    desc: 同一个code只能换取一次access_token
    status: passed
    evidence: GitHub API机制保障

  - id: c3
    title: 新用户自动创建
    desc: GitHub账号未绑定时自动创建本地用户，用户名格式 github_xxx
    status: passed
    evidence: GithubOAuthService.java findOrCreateUser()，实际OAuth测试已验证

  - id: c4
    title: 已绑定用户直接登录
    desc: GitHub账号已绑定时直接返回Token，不重复创建用户
    status: passed
    evidence: GithubOAuthService.java findOrCreateUser()，从数据库查询真实用户信息

  - id: c5
    title: Token格式与密码登录一致
    desc: OAuth登录返回的Token与用户名密码登录格式相同
    status: passed
    evidence: 均使用 StpUtil.login() 生成，实际测试返回 JWT Token

  - id: c6
    title: 绑定关系唯一
    desc: 同一个GitHub账号只能绑定一个本地用户
    status: passed
    evidence: sys_social_bind表唯一索引 uk_social_bind (social_type, social_id)
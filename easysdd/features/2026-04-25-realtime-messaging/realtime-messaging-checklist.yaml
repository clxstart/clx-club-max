checks:
  # 范围守护
  - id: scope-01
    type: scope-guard
    description: 不做群聊（单聊优先）
    verify: grep 无 GroupChat/GroupMessage 相关代码
    status: passed

  - id: scope-02
    type: scope-guard
    description: 不做消息搜索
    verify: clx-message 无 ES 依赖，无 SearchService
    status: passed

  - id: scope-03
    type: scope-guard
    description: 不做消息撤回/编辑
    verify: 无 recall/edit 相关接口
    status: passed

  - id: scope-04
    type: scope-guard
    description: 单设备假设（踢掉旧连接）
    verify: WsSessionManager 有踢旧连接逻辑
    status: passed

  - id: scope-05
    type: scope-guard
    description: 不做富媒体消息
    verify: ChatMessage 只有 content 字段，无 mediaUrl
    status: passed

  - id: scope-06
    type: scope-guard
    description: 不做消息已读回执
    verify: 无 readStatus/ack 相关逻辑
    status: passed

  # 接口一致性
  - id: api-01
    type: contract
    description: POST /message/send 返回 messageId 和 timestamp
    verify: 接口响应包含 messageId 和 timestamp
    status: passed

  - id: api-02
    type: contract
    description: GET /message/sessions 返回会话列表含未读数
    verify: 响应 list[].unreadCount 存在
    status: passed

  - id: api-03
    type: contract
    description: GET /notification/unread-count 返回分类未读数
    verify: 响应包含 chat/comment/like/follow/system
    status: passed

  - id: api-04
    type: contract
    description: WebSocket 消息格式符合 WsEnvelope
    verify: 推送消息包含 type 字段
    status: passed

  - id: api-05
    type: contract
    description: 握手失败返回 4401
    verify: 无效 token 连接被关闭，code=4401
    status: passed


server:
  port: 9201

spring:
  application:
    name: clx-user
  profiles:
    active: dev

  # Nacos 配置导入
  config:
    import:
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP

  # Nacos 服务发现和配置中心
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        enabled: false
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        enabled: false
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yaml

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.clx.user.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.clx: debug

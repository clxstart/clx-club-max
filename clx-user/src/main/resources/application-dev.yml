spring:
  # 数据源（Docker容器）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/clx_user?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 1
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 禁用Nacos（开发环境）
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

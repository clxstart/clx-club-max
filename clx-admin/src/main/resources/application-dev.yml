server:
  port: 9700

spring:
  application:
    name: clx-admin

  # 数据源配置（本地开发）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3308/clx_user?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

  # Nacos 配置导入（本地开发禁用）
  config:
    import:
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP

  # Nacos 服务发现和配置中心
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        enabled: false  # 本地开发禁用 Nacos 配置

# sa-Token 配置（共享 Redis）
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  token-prefix: Bearer
  is-log: false
  # JWT 密钥（与 clx-auth 保持一致）
  jwt-secret-key: CLX-Community-JWT-Secret-Key-2024-Please-Change-In-Production

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Feign 配置（本地开发直接指定 URL）
feign:
  client:
    config:
      clx-auth:
        url: http://localhost:9100
      clx-user:
        url: http://localhost:9201
      clx-post:
        url: http://localhost:9300
      clx-analytics:
        url: http://localhost:9800

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    com.clx: debug
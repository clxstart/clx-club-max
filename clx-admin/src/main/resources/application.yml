server:
  port: 9700

spring:
  application:
    name: clx-admin

  # Nacos 配置导入
  config:
    import:
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP

  # Nacos 服务发现和配置中心
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yaml

# sa-Token 配置（共享 Redis）
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  token-prefix: Bearer
  is-log: false
  # JWT 密钥（与 clx-auth 保持一致）
  jwt-secret-key: CLX-Community-JWT-Secret-Key-2024-Please-Change-In-Production

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Feign 配置（使用服务发现）
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

# 日志配置
logging:
  level:
    com.clx: debug
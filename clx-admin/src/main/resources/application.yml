server:
  port: 9700

spring:
  application:
    name: clx-admin
  datasource:
    url: jdbc:mysql://localhost:3308/clx_auth?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

# sa-Token 配置（共享 Redis）
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  token-prefix: Bearer
  is-log: false
  # JWT 密钥（与 clx-auth 保持一致）
  jwt-secret-key: CLX-Community-JWT-Secret-Key-2024-Please-Change-In-Production

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Feign 配置
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      clx-user:
        url: http://localhost:9201
      clx-auth:
        url: http://localhost:9100

# 日志配置
logging:
  level:
    com.clx: debug
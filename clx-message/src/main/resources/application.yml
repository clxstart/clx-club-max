spring:
  application:
    name: clx-message

  # 默认启用dev环境配置
  profiles:
    active: dev

  # Nacos服务发现和配置（当前禁用）
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# sa-token 配置
sa-token:
  token-name: Authorization
  timeout: ${SA_TOKEN_TIMEOUT:14400}
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT:7200}
  is-concurrent: true
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  token-prefix: Bearer
  is-log: true
  jwt-secret-key: ${JWT_SECRET_KEY:CLX-Community-JWT-Secret-Key-2024-Please-Change-In-Production}

# CORS跨域配置
cors:
  allowed-origins: "*"
  allow-credentials: false

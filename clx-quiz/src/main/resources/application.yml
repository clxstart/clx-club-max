spring:
  application:
    name: clx-quiz

  # 默认启用dev环境配置
  profiles:
    active: dev

  # Nacos 配置导入
  config:
    import:
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP

  # Nacos 服务发现和配置中心
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yaml

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# sa-token 配置
sa-token:
  token-name: Authorization
  timeout: ${SA_TOKEN_TIMEOUT:14400}
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT:7200}
  is-concurrent: true
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  token-prefix: Bearer
  is-log: true
  jwt-secret-key: ${JWT_SECRET_KEY:CLX-Community-JWT-Secret-Key-2024-Please-Change-In-Production}

# CORS跨域配置
cors:
  allowed-origins: "*"
  allow-credentials: false

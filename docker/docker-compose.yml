# CLX 社区平台 - 完整基础设施
# 一键启动：docker-compose up -d
# 项目名：clx

services:
  # ========================================
  # 数据存储（MySQL + Redis）
  # ========================================

  mysql:
    image: mysql:8.0
    container_name: clx-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../doc/sql:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clx-network

  redis:
    image: redis:7-alpine
    container_name: clx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clx-network

  # ========================================
  # 服务注册与配置（Nacos）
  # ========================================

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: clx-nacos
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=root123
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clx-network

  # ========================================
  # 搜索与消息（Elasticsearch + RabbitMQ）
  # ========================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: clx-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
      - "9301:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clx-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: clx-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=clx
      - RABBITMQ_DEFAULT_PASSWORD=clx123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clx-network

  # ========================================
  # 可观测性（Zipkin + Sentinel）
  # ========================================

  zipkin:
    image: openzipkin/zipkin:3
    container_name: clx-zipkin
    ports:
      - "9411:9411"
    networks:
      - clx-network

  sentinel:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: clx-sentinel
    ports:
      - "8858:8858"
    environment:
      - AUTH_USERNAME=sentinel
      - AUTH_PASSWORD=sentinel
    networks:
      - clx-network

  # ========================================
  # 大数据（Hadoop HDFS + Hive）
  # ========================================

  namenode:
    image: apache/hadoop:3.3.6
    container_name: clx-namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      HADOOP_HOME: /opt/hadoop
      ENSURE_NAMENODE_DIR: /data/hadoop/dfs/name
    command: hdfs namenode
    volumes:
      - ./data/namenode:/data/hadoop
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - clx-network

  datanode:
    image: apache/hadoop:3.3.6
    container_name: clx-datanode
    hostname: datanode
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      HADOOP_HOME: /opt/hadoop
      ENSURE_DATANODE_DIR: /data/hadoop/dfs/data
    command: hdfs datanode
    volumes:
      - ./data/datanode:/data/hadoop
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - clx-network

  hive:
    image: apache/hive:4.0.0
    container_name: clx-hive
    hostname: hive
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./data/hive:/opt/hive/data
      - ./config/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./config/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - clx-network

volumes:
  mysql_data:
  redis_data:
  es_data:
  rabbitmq_data:

networks:
  clx-network:
    external: true
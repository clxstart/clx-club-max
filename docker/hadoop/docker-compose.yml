# Hadoop 伪分布式集群（学习环境）
# 包含：HDFS (NameNode + DataNode) + Hive
# 端口：HDFS 9870/9000，Hive 10000

services:
  namenode:
    image: apache/hadoop:3.3.6
    container_name: clx-namenode
    hostname: namenode
    ports:
      - "9870:9870"   # HDFS Web UI
      - "9000:9000"   # HDFS RPC
    environment:
      HADOOP_HOME: /opt/hadoop
      ENSURE_NAMENODE_DIR: /opt/hadoop/dfs/name
    command: ["hdfs", "namenode"]
    volumes:
      - namenode_data:/opt/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 3

  datanode:
    image: apache/hadoop:3.3.6
    container_name: clx-datanode
    hostname: datanode
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      HADOOP_HOME: /opt/hadoop
    command: ["hdfs", "datanode"]
    volumes:
      - datanode_data:/opt/hadoop/dfs/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9864"]
      interval: 30s
      timeout: 10s
      retries: 3

  hive-server:
    image: apache/hive:3.1.3
    container_name: clx-hive
    hostname: hive
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_healthy
    ports:
      - "10000:10000"  # HiveServer2
      - "10002:10002"  # Hive Web UI
    environment:
      SERVICE_NAME: hiveserver2
      DB_DRIVER: derby
    volumes:
      - hive_data:/opt/hive/data
      - ../../doc/hive:/opt/hive/scripts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10002"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  namenode_data:
  datanode_data:
  hive_data:

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLX 社区</title>
  <style>
    :root{--bg:#e0e5ec;--text:#2f3640;--muted:#697386;--accent:#6c63ff;--danger:#d84f61;--shadow:8px 8px 16px #b8bcc2,-8px -8px 16px #fff;--soft:5px 5px 10px #b8bcc2,-5px -5px 10px #fff;--inset:inset 5px 5px 10px #b8bcc2,inset -5px -5px 10px #fff}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,"Segoe UI",system-ui,sans-serif}.app{padding:28px}.top{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-bottom:20px}.brand{display:flex;gap:14px;align-items:center}.logo{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;box-shadow:var(--soft);font-weight:800;color:var(--accent)}h1,h2,h3{margin:0 0 12px}p{line-height:1.7}.muted{color:var(--muted)}.nav,.row{display:flex;flex-wrap:wrap;gap:12px}.btn,input,select,textarea{border:0;border-radius:18px;background:var(--bg);color:var(--text);font:inherit}.btn{padding:12px 18px;box-shadow:var(--soft);cursor:pointer}.btn.primary,.btn:active{box-shadow:var(--inset);color:#4d46d6}.btn.danger{color:var(--danger)}input,select,textarea{width:100%;padding:13px 16px;box-shadow:var(--inset);outline:0}textarea{min-height:130px;resize:vertical}.grid{display:grid;grid-template-columns:minmax(0,1.5fr)minmax(320px,.8fr);gap:24px}.card{border-radius:28px;background:var(--bg);box-shadow:var(--shadow);padding:24px;margin-bottom:22px}.list{display:grid;gap:16px}.item{border-radius:24px;padding:18px;box-shadow:var(--soft);background:var(--bg);cursor:pointer}.item.active{box-shadow:var(--inset)}.meta,.status{color:var(--muted);font-size:14px}.tag{display:inline-block;border-radius:999px;padding:6px 10px;margin:4px;box-shadow:inset 2px 2px 5px #b8bcc2,inset -2px -2px 5px #fff;font-size:12px}.status{min-height:24px;margin-bottom:16px}.error{color:var(--danger)}.tabs{display:none}.tabs.active{display:block}.form{display:grid;gap:12px}.comment{border-radius:18px;box-shadow:var(--inset);padding:14px;margin-top:12px;white-space:pre-wrap}@media(max-width:900px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body><main class="app"><header class="top"><div class="brand"><div class="logo">CLX</div><div><h1>CLX 社区</h1><p class="muted">静态前端已真实启动，接口走 8080 网关。</p></div></div><nav class="nav"><button class="btn primary" data-tab="home">首页</button><button class="btn" data-tab="auth">登录注册</button><button class="btn" data-tab="compose">发帖</button><button class="btn" data-tab="search">搜索</button><button class="btn" data-tab="account">账号</button></nav></header><div id="status" class="status">正在连接后端...</div>
<section id="home" class="tabs active"><div class="grid"><div><div class="card"><h2>帖子列表</h2><div class="row"><select id="sort"><option value="latest">最新</option><option value="hot">热门</option><option value="recommend">推荐</option></select><button class="btn primary" onclick="loadPosts()">刷新帖子</button></div></div><div id="posts" class="list"></div></div><aside><div class="card"><h2 id="detailTitle">帖子详情</h2><p id="detailContent" class="muted">请选择左侧帖子。</p><div class="row"><button class="btn primary" onclick="likeSelected()">点赞/取消</button></div><form class="form" onsubmit="addComment(event)"><textarea id="commentText" placeholder="写评论"></textarea><button class="btn primary">发表评论</button></form><div id="comments"></div></div><div class="card"><h2>热门帖子</h2><div id="hotPosts"></div></div></aside></div></section>
<section id="auth" class="tabs"><div class="grid"><div class="card"><h2>登录</h2><form class="form" onsubmit="login(event)"><input id="loginUsername" placeholder="用户名"><input id="loginPassword" type="password" placeholder="密码"><div class="row"><button type="button" class="btn" onclick="loadCaptcha()">刷新验证码</button><img id="captchaImg" style="max-width:140px;border-radius:14px"></div><input id="loginCaptcha" placeholder="图形验证码"><button class="btn primary">登录</button></form></div><div class="card"><h2>注册</h2><form class="form" onsubmit="register(event)"><input id="regUsername" placeholder="用户名"><input id="regNickname" placeholder="昵称"><input id="regEmail" placeholder="邮箱"><button type="button" class="btn" onclick="sendEmailCode()">发送邮箱验证码</button><input id="regEmailCode" placeholder="邮箱验证码"><input id="regPassword" type="password" placeholder="密码"><input id="regConfirm" type="password" placeholder="确认密码"><button class="btn primary">注册</button></form></div></div></section>
<section id="compose" class="tabs"><div class="grid"><div class="card"><h2>发布帖子</h2><form class="form" onsubmit="createPost(event)"><input id="postTitle" placeholder="标题"><textarea id="postContent" placeholder="内容"></textarea><select id="postCategory"></select><input id="postTags" placeholder="标签ID，逗号分隔"><button class="btn primary">发布</button></form></div><aside><div class="card"><h2>分类/标签</h2><div id="taxonomies"></div></div></aside></div></section>
<section id="search" class="tabs"><div class="card"><h2>聚合搜索</h2><form class="row" onsubmit="doSearch(event)"><input id="keyword" placeholder="关键词"><button class="btn primary">搜索</button></form><div id="searchResult" class="list"></div></div></section>
<section id="account" class="tabs"><div class="card"><h2>账号中心</h2><div class="row"><button class="btn primary" onclick="me()">获取当前用户</button><button class="btn" onclick="refreshToken()">刷新 Token</button><button class="btn danger" onclick="logout()">退出</button><button class="btn" onclick="bindings()">社交绑定</button></div><pre id="accountInfo" class="comment"></pre></div></section>
</main><script>
const API='http://localhost:8080';let token=localStorage.clx_token||'',tokenName=localStorage.clx_token_name||'Authorization',captchaId='',selectedId=0,categories=[],tags=[];const $=id=>document.getElementById(id);function msg(t,e=false){$('status').textContent=t;$('status').className=e?'status error':'status'}async function req(path,opt={}){const h=opt.headers||{};if(opt.body)h['Content-Type']='application/json';if(token){h[tokenName]=token;h.Authorization='Bearer '+token}const r=await fetch(API+path,{...opt,headers:h,credentials:'include'});const j=await r.json().catch(()=>({code:r.status,msg:r.statusText}));if(!r.ok||j.code!==200)throw Error(j.msg||'请求失败');return j.data}async function run(fn,ok){try{const d=await fn();msg(ok);return d}catch(e){msg(e.message,true)}}document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs').forEach(x=>x.classList.remove('active'));$(b.dataset.tab).classList.add('active');document.querySelectorAll('[data-tab]').forEach(x=>x.classList.remove('primary'));b.classList.add('primary')});function saveLogin(d){token=d.tokenValue||d.token||'';tokenName=d.tokenName||'Authorization';localStorage.clx_token=token;localStorage.clx_token_name=tokenName}
async function loadCaptcha(){const d=await run(()=>req('/auth/captcha'),'验证码已刷新');if(d){captchaId=d.captchaId;const raw=d.imageBase64||d.image||d.captchaImage||'';$('captchaImg').src=raw.startsWith('data:')?raw:'data:image/png;base64,'+raw}}async function loadTax(){const d=await run(async()=>({c:await req('/category/list'),t:await req('/tag/list')}),'分类标签已加载');if(d){categories=d.c||[];tags=d.t||[];$('postCategory').innerHTML='<option value="">选择分类</option>'+categories.map(x=>`<option value="${x.id}">${x.name}</option>`).join('');$('taxonomies').innerHTML='<h3>分类</h3>'+categories.map(x=>`<span class="tag">${x.id} ${x.name}</span>`).join('')+'<h3>标签</h3>'+tags.map(x=>`<span class="tag">${x.id} ${x.name}</span>`).join('')}}async function loadPosts(){const d=await run(()=>req('/post/list?sort='+$('sort').value+'&page=1&size=20'),'帖子已刷新');$('posts').innerHTML=(d?.posts||[]).map(p=>`<div class="item" onclick="detail(${p.id})"><h3>${p.title}</h3><p class="muted">${p.summary||'暂无摘要'}</p><div>${(p.tags||[]).map(t=>`<span class="tag">${t.name}</span>`).join('')}</div><p class="meta">${p.author?.name||'匿名'} · 赞 ${p.likeCount||0} · 评 ${p.commentCount||0}</p></div>`).join('')||'<div class="card muted">暂无帖子</div>'}async function hot(){const d=await run(()=>req('/post/hot?limit=8'),'热门已加载');$('hotPosts').innerHTML=(d||[]).map(x=>`<p>${x.title}</p>`).join('')||'暂无'}async function detail(id){selectedId=id;const d=await run(()=>req('/post/'+id),'详情已加载');if(d){$('detailTitle').textContent=d.title;$('detailContent').textContent=d.content||d.summary||''}const cs=await run(()=>req(`/post/${id}/comments`),'评论已加载');$('comments').innerHTML=(cs||[]).map(c=>`<div class="comment"><b>${c.author?.name||'匿名'}</b><p>${c.content}</p></div>`).join('')}async function likeSelected(){if(selectedId)await run(()=>req('/post/'+selectedId+'/like',{method:'POST'}),'点赞已提交')}async function addComment(e){e.preventDefault();if(!selectedId)return msg('先选择帖子',true);await run(()=>req(`/post/${selectedId}/comment`,{method:'POST',body:JSON.stringify({content:$('commentText').value})}),'评论已发布');$('commentText').value='';detail(selectedId)}
async function login(e){e.preventDefault();const d=await run(()=>req('/auth/login',{method:'POST',body:JSON.stringify({username:$('loginUsername').value,password:$('loginPassword').value,captchaId,captchaCode:$('loginCaptcha').value,rememberMe:true})}),'登录成功');if(d)saveLogin(d)}async function sendEmailCode(){await run(()=>req('/auth/email-code/send',{method:'POST',body:JSON.stringify({email:$('regEmail').value})}),'邮箱验证码已发送')}async function register(e){e.preventDefault();const d=await run(()=>req('/auth/register',{method:'POST',body:JSON.stringify({username:$('regUsername').value,nickname:$('regNickname').value,email:$('regEmail').value,emailCode:$('regEmailCode').value,password:$('regPassword').value,confirmPassword:$('regConfirm').value})}),'注册成功');if(d)saveLogin(d)}async function createPost(e){e.preventDefault();const id=await run(()=>req('/post/create',{method:'POST',body:JSON.stringify({title:$('postTitle').value,content:$('postContent').value,categoryId:$('postCategory').value||undefined,tagIds:$('postTags').value.split(',').map(x=>x.trim()).filter(Boolean)})}),'帖子已发布');if(id){loadPosts();detail(id)}}async function doSearch(e){e.preventDefault();const kw=$('keyword').value;const d=await run(()=>req('/search/aggregate',{method:'POST',body:JSON.stringify({keyword:kw,page:1,size:10,enableHighlight:true,enableSuggest:true})}),'搜索完成');$('searchResult').innerHTML=Object.entries(d?.results||{}).map(([k,v])=>`<div class="item"><h3>${k} · ${v.total}</h3>${(v.items||[]).slice(0,5).map(i=>`<p>${i.title||i.name||i.content||JSON.stringify(i)}</p>`).join('')}</div>`).join('')||'<p class="muted">暂无结果</p>'}async function me(){const d=await run(()=>req('/auth/me'),'用户信息已获取');$('accountInfo').textContent=JSON.stringify(d,null,2)}async function refreshToken(){const d=await run(()=>req('/auth/refresh',{method:'POST'}),'Token 已刷新');if(d)saveLogin(d)}async function logout(){await run(()=>req('/auth/logout',{method:'POST'}),'已退出');localStorage.clear();token=''}async function bindings(){const d=await run(()=>req('/auth/bindings'),'绑定列表已获取');$('accountInfo').textContent=JSON.stringify(d,null,2)}
loadCaptcha();loadTax();loadPosts();hot();
</script></body></html>

server:
  port: 9400

spring:
  application:
    name: clx-search
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/clx_search?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: clx
    password: clx123
    virtual-host: /
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# Elasticsearch 配置
elasticsearch:
  host: localhost
  port: 9201
  username: ""
  password: ""

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    com.clx: debug
    org.springframework: info

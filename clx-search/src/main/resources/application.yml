server:
  port: 9400

spring:
  application:
    name: clx-search
  profiles:
    active: dev

  # Nacos 配置导入
  config:
    import:
      - optional:nacos:common-redis.yaml?group=DEFAULT_GROUP
      - optional:nacos:common-mysql.yaml?group=DEFAULT_GROUP

  # Nacos 服务发现和配置中心
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
      config:
        enabled: true
        namespace: ${NACOS_NAMESPACE:}
        group: DEFAULT_GROUP
        file-extension: yaml

# Elasticsearch 配置
elasticsearch:
  host: localhost
  port: 9201
  username: ""
  password: ""

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    com.clx: debug
    org.springframework: info

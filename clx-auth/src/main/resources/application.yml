server:
  port: 9100

spring:
  application:
    name: clx-auth

  # 默认启用dev环境配置（包含数据库和Redis）
  profiles:
    active: dev

  # Nacos服务发现和配置（当前禁用，使用本地配置）
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  # 数据库配置（基础配置，具体参数在application-dev.yml中）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# sa-Token 配置
sa-token:
  # Token名称，同时也是Cookie名称
  token-name: Authorization
  # Token有效期（秒），默认4小时
  timeout: ${SA_TOKEN_TIMEOUT:14400}
  # Token临时有效期（秒），默认2小时
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT:7200}
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否从请求体里读取Token
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  # Token风格：uuid
  token-style: uuid
  # Token前缀
  token-prefix: Bearer
  # 是否输出操作日志
  is-log: true

# CORS跨域配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  allow-credentials: false

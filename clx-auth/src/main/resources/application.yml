spring:
  application:
    name: clx-auth

  # 默认启用dev环境配置（包含数据库和Redis）
  profiles:
    active: dev

  # Nacos服务发现和配置（当前禁用，使用本地配置）
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  # 数据库配置（基础配置，具体参数在application-dev.yml中）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ========== 邮件配置 ==========
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@clx.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            enable: false

# sa-token 配置
sa-token:
  # Token名称，同时也是Cookie名称
  token-name: Authorization
  # Token有效期（秒），默认4小时
  timeout: ${SA_TOKEN_TIMEOUT:14400}
  # Token临时有效期（秒），默认2小时
  active-timeout: ${SA_TOKEN_ACTIVE_TIMEOUT:7200}
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否从请求体里读取Token
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  # Token前缀
  token-prefix: Bearer
  # 是否输出操作日志
  is-log: true

  # ========== JWT 配置（sa-token-jwt 插件） ==========
  # JWT 密钥：用于签名和验证 Token，建议32+字符
  # 生产环境请使用环境变量 JWT_SECRET_KEY 设置，不要在配置文件中暴露真实密钥
  jwt-secret-key: ${JWT_SECRET_KEY:CLX-Community-JWT-Secret-Key-2024-Please-Change-In-Production}

# CORS跨域配置（允许所有来源）
cors:
  allowed-origins: "*"
  allow-credentials: false

clx:
  auth:
    remember-me:
      timeout: ${CLX_REMEMBER_ME_TIMEOUT:2592000}
      active-timeout: ${CLX_REMEMBER_ME_ACTIVE_TIMEOUT:604800}

# ========== OAuth 第三方登录配置 ==========
oauth:
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:9100/auth/oauth/github/callback}
  qq:
    app-id: ${QQ_APP_ID:}
    app-key: ${QQ_APP_KEY:}
    redirect-uri: ${QQ_REDIRECT_URI:http://localhost:9100/auth/oauth/qq/callback}
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    redirect-uri: ${WECHAT_REDIRECT_URI:http://localhost:9100/auth/oauth/wechat/callback}